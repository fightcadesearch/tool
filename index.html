<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G4835K7P1B"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-G4835K7P1B');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fightcade - Search</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./favicon.ico">
    <script src="./i18n.js"></script>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="container">
                <div class="logo">
                    <a href="#">
                        <svg xmlns="http://www.w3.org/2000/svg" width="290" height="40" viewBox="0 0 290 40" title="Fightcade beta">
                            <g fill="#33f1e5">
                                <path d="M227.3 39.995h-12.564l-6.17-13.1-6.4 13.1H189.6L208.566.01zM285.913 20.003l-4.947-8.569h9.055L288.618.01h-28.2l11.546 19.993-11.546 19.992h28.2l1.403-11.424h-9.055l4.947-8.568zM29.333 11.434L27.931.01H0l6.377 11.045h-.002l1.892 3.278H0v25.662h11.424V25.757h17.1l-8.269-14.323h9.078zM32.849.01h11.424v39.985H32.849zM110.355 0v14.285h-8.646V0H90.285v39.995h11.424V25.709h8.646v14.286h11.425V0h-11.425zM86.207 16.232H68.782l-.975 7.94h7.135A8.539 8.539 0 0 1 58.935 20a8.391 8.391 0 0 1 15.037-5.556l5.519-9.561c-2.325-2.773-6.6-4.7-10.93-4.847C57.526-.344 47.511 8.961 47.511 20A19.992 19.992 0 0 0 67.5 39.995c11.045 0 19.1-8.951 19.1-19.995a19.853 19.853 0 0 0-.393-3.768zM155.942 0h-29.677v11.424h7.986V39.98h11.424V11.424h8.864L155.942 0zM182.756 25.046a8.574 8.574 0 1 1 0-10.087l5.937-10.284a20 20 0 1 0 0 30.655z"></path>
                                <path d="M243.461.01H230.1v39.985l13.361.005a20 20 0 0 0 0-39.99zm0 28.566h-1.933V11.434h1.933a8.571 8.571 0 0 1 0 17.142z"></path>
                            </g>
                        </svg>
                    </a>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <div class="main-content">
                    <div class="stats-section">
                        <div class="stats-header">
                            <h2 class="stats-title">ESTATÍSTICAS</h2>
                            <span id="lastUpdate" class="stats-update"></span>
                        </div>
                        <div id="statsContent" class="stats-content">
                            <!-- Estatísticas serão inseridas aqui via JavaScript -->
                        </div>
                    </div>

                    <div class="search-section">
                        <div class="search-column">
                            <h2 class="search-title">BUSCAR JOGADOR</h2>
                            <div class="search-wrapper">
                                <input 
                                    type="text" 
                                    id="playerSearch" 
                                    class="search-input" 
                                    placeholder="Digite o nome do jogador..."
                                    autocomplete="off"
                                >
                                <div id="autocomplete" class="autocomplete-list"></div>
                            </div>
                            <p class="search-footer">
                                <span id="notFoundText"></span>
                                <a href="https://docs.google.com/forms/d/e/1FAIpQLSfVl-mEaf4d8HjBu52VoPDNyoWwgcdFLgpKIsbHGJIb0sVe6g/viewform?usp=dialog" target="_blank" class="footer-link" id="requestLink"></a>
                            </p>
                        </div>
                        
                        <div class="filters-column">
                            <h2 class="filters-title">FILTROS</h2>
                            <button id="filterToggle" class="filter-toggle-btn">Filtrar Países</button>
                            <div id="filterPanel" class="filter-panel">
                                <div id="filterContent" class="filter-content"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="./script.js"></script>
</body>
</html>
